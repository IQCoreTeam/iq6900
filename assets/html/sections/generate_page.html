<div class="upload_image gen_upload" >
    <div class="contents_input">


        <label for="imageUpload" class="custom-file-upload">
            <img class="upload_img_logo" src="img/img_logo_white.svg">
            <a class="file-name">Select Image</a>
        </label>

        <input
                type="file"
                id="imageUpload"
                accept="image/*"
                style="display: none"
        />
    </div>
    <div class="generate_result">
        <img class="generate_result_img" alt="result">
    </div>
</div>


<div class="gen_menus row_flex" >
    <div class="gen_menu row_flex center">
        <p class="manage_info" >Font size</p>
        <div class="row_flex center">
            <input type='button'
                   class="arrow_button left_arrow"
                   onclick="
                       const number = parseInt($('#font_input').val());
                       if(number>5)
                       $('#font_input').val(number-1)
                        "
            />

            <input type="number" id="font_input" class='input_number' min="5" max="50" value="8" readonly>

            <input type='button'
                   class="arrow_button right_arrow"
                   onclick="
                       const number = parseInt($('#font_input').val());
                       if(number<50)
                       $('#font_input').val(number+1)
                        "
            />
        </div>
    </div>
    <div class="gen_menu row_flex center">
        <p class="manage_info">Distance</p>
        <div class="row_flex center">
            <input type='button'
                   class="arrow_button left_arrow"
                   onclick="
                       const number = parseInt($('#distance_input').val());
                       if(number>-50)
                       $('#distance_input').val(number-1)
                        "
            />

            <input type="number" id="distance_input" class='input_number' min="-50" max="50" value="-2" readonly>

            <input type='button'
                   class="arrow_button right_arrow"
                   onclick="
                       const number = parseInt($('#distance_input').val());
                       if(number<50)
                       $('#distance_input').val(number+1)
                        "
            />
        </div>
    </div>
</div>
