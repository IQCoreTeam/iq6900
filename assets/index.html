<!doctype html>
<html lang="en-US" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/fonts.css?ver=20250211"/>
    <link rel="stylesheet" href="css/index.css?ver=20250318"/>
    <link rel="stylesheet" href="css/juche.css?ver=20260402"/>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>

    <script type="module">
        import {BrowserSDK, AddressType ,NetworkId} from 'https://cdn.jsdelivr.net/npm/@phantom/browser-sdk@0.3.8/+esm'

        window.ptSdk = new BrowserSDK({
            providerType: "injected",
            addressTypes: [AddressType.solana],
        });
        window.NetworkId = NetworkId;

    </script>


    <script src="https://bundle.run/buffer@6.0.3"></script>

    <!--My js-->
    <script type="text/javascript" src="js/sections/pages/code_in_hub_page.js?ver=20250211"></script>
    <script type="text/javascript" src="js/sections/pages/main_page.js?ver=20250318"></script>
    <script type="text/javascript" src="js/sections/pages/about_page.js?ver=20250212"></script>


    <script type="text/javascript" src="js/sections/pages/onchain_page.js?ver=20250210"></script>
    <script type="text/javascript" src="js/sections/pages/generate_page.js?ver=20250209"></script>
    <script type="text/javascript" src="js/init.js?ver=20250318"></script>
    <script type="text/javascript" src="js/code_in_contract.js?ver=20250843"></script>
    <script type="text/javascript" src="js/check_contract.js?ver=20250849"></script>
    <script type="text/javascript" src="js/compress.js?ver=20250209"></script>
    <script type="text/javascript" src="js/navigator.js?ver=20250209"></script>
    <script type="text/javascript" src="js/effects/loading.js?ver=20250209"></script>
    <script type="text/javascript" src="js/decoder/mp3_decoder.js?ver=20250209"></script>

    <title>Dear Leader Labs</title>
    <link rel="icon" href="img/coinlogo.png"/>
</head>
<body>

<!-- Fixed Background -->
<div class="background_div">
    <img class="background_image" src="img/animeVid.gif" alt="anime">
    <div class="background_Linear_color"></div>
</div>

<div class="loading-screen center">
    <img class="loading_img" src="img/solana_internet.svg">
    <div class="loading-item center">
        <div class="code-animation">
            <span class="typing-text"></span>
        </div>

        <div id ="loading-bar" class="loading-bar"></div>
    </div>
</div>

<div class="full_div column_flex">
    <div class="pc_menu">
        <div class="nav_bar row_flex lp_top_bar">
            <img class="main_title  z-index_top" src="img/text_logo.png" alt="IQLabs" onclick="$.mainPage.init()">
            <div class="row_flex lp_top_bar_right">
                <div class="row_flex lp_top_bar_links">
                    <a onclick="document.getElementById('lp_projects').scrollIntoView({behavior:'smooth'});" style="cursor:pointer;">The Stack</a>
                    <a onclick="$.generatePage.init();" style="cursor:pointer;">Art Generator</a>
                </div>
                <div class="row_flex nav_icons" style="gap: 0.8rem;">
                    <img class="telegram" onclick="window.open('https://t.me/IQLabsPortal')" src="img/telegram.svg" alt="Telegram">
                    <img class="x" onclick="window.open('https://x.com/IQLabsOfficial')" src="img/x.svg" alt="X">
                    <img class="github" onclick="window.open('https://github.com/IQCoreTeam')" src="img/github.svg" alt="Github">
                </div>
            </div>
        </div>

    </div>
    <section id="main_section">
    </section>


</div>

</body>

</html>
